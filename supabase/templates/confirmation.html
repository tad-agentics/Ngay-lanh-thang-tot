<h2>Xác nhận đăng ký</h2>
<p>

  kích hoạt tài khoản và hoàn tất lập lá số.
</p>
<p>
  <a
    href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=signup"

      padding: 12px 20px;

      color: #ede7d3;
      text-decoration: none;
      font-weight: 700;

</p>
<p style="font-size: 13px; color: #666">
  Nếu bạn không đăng ký, bỏ qua email này. Link hết hạn sau 1 giờ.
</p>
